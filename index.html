<!DOCTYPE html>
<html lang="en">
<!-- 
  YOUR BECOMING — Quiz
  =====================
  FOLDER STRUCTURE (all files in the same folder):
    index.html
    discover.jpg
    release.jpg
    reclaim.jpg
    become.jpg
    transition.jpg
    discover.mp3
    release.mp3
    reclaim.mp3
    become.mp3
    transition.mp3

  TO PUBLISH: Enable GitHub Pages in your repo settings.
  TO UPDATE BOOKING LINK: Find BOOKING_LINK near the top of the script and replace the URL.
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg-start: #f7e9e3;
    --bg-end: #f1dde2;
    --card-bg: #fffbf8;
    --text-dark: #3d2b35;
    --text-muted: #8a7480;
    --accent: #b04f63;
    --accent-soft: #e8c3cb;
    --accent-deep: #8c3a4c;
    --gold: #c5a05f;
    --line: #ecdcd9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 16px;
    color: var(--text-dark);
  }
  #app { width: 100%; max-width: 640px; }

  .card {
    background: var(--card-bg);
    border-radius: 28px;
    padding: 52px 44px;
    box-shadow: 0 30px 60px -20px rgba(140,58,76,0.25), 0 0 0 1px rgba(255,255,255,0.5) inset;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.45s ease;
  }
  .card::before {
    content:'';
    position:absolute; top:-60px; right:-60px;
    width:180px; height:180px; border-radius:50%;
    background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
    opacity:0.5;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  /* INTRO */
  .eyebrow { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:14px; }
  h1 { font-family:Georgia,serif; font-size:30px; line-height:1.25; margin-bottom:18px; }
  .intro-text { font-size:15.5px; line-height:1.75; color:var(--text-muted); margin-bottom:32px; }
  .intro-text strong { color:var(--text-dark); }

  .btn-primary {
    background:var(--accent); color:#fff; border:none;
    padding:16px 34px; font-size:15px; font-weight:600; letter-spacing:0.4px;
    border-radius:999px; cursor:pointer;
    box-shadow:0 10px 25px -10px rgba(176,79,99,0.55);
    transition: all 0.2s ease;
  }
  .btn-primary:hover { background:var(--accent-deep); transform:translateY(-2px); }

  /* PROGRESS */
  .progress-wrap { margin-bottom:26px; }
  .progress-label { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); margin-bottom:9px; }
  .progress-bar { height:5px; background:var(--line); border-radius:999px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent-soft),var(--accent)); border-radius:999px; transition:width 0.4s ease; }

  /* QUESTION */
  .q-text { font-family:Georgia,serif; font-size:21px; line-height:1.45; margin:8px 0 26px; }
  .options { display:flex; flex-direction:column; gap:11px; }
  .opt-btn {
    text-align:left; background:#fffefc; border:1.5px solid var(--line);
    border-radius:14px; padding:15px 18px; font-size:14.5px; line-height:1.55;
    color:var(--text-dark); cursor:pointer; transition:all 0.2s ease; font-family:inherit;
  }
  .opt-btn:hover { border-color:var(--accent); background:#fdf6f4; transform:translateX(2px); }
  .opt-btn.selected { background:var(--accent-soft); border-color:var(--accent); }

  /* RESULT */
  .result-card { animation:fadeIn 0.5s ease; }

  /* Phase card image */
  .phase-image-wrap {
    width:100%; display:flex; justify-content:center;
    margin-bottom:32px;
  }
  .phase-image-wrap img {
    width:240px;
    border-radius:18px;
    box-shadow: 0 20px 50px -15px rgba(140,58,76,0.3);
    display:block;
  }
  /* Placeholder shown when no real image src is set */
  .phase-image-placeholder {
    width:240px; height:340px; border-radius:18px;
    background:linear-gradient(160deg,#f0e6ea,#e8d5d0);
    border:1.5px dashed var(--line);
    display:flex; align-items:center; justify-content:center;
    color:var(--text-muted); font-size:13px; text-align:center; padding:20px;
  }

  .result-eyebrow { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:10px; }
  .result-label { font-family:Georgia,serif; font-size:36px; color:var(--accent-deep); letter-spacing:1px; margin-bottom:8px; }
  .result-tagline { font-family:Georgia,serif; font-style:italic; font-size:17px; color:var(--text-dark); line-height:1.5; margin-bottom:26px; }

  .result-body p { font-size:15px; line-height:1.8; color:var(--text-muted); margin-bottom:15px; }
  .result-body p.solo { color:var(--text-dark); font-weight:600; margin-bottom:0; }

  /* MEDITATION PLAYER */
  .meditation-wrap {
    margin-top:30px; padding:22px 24px;
    background:linear-gradient(135deg,#fdf5f2,#f8eaec);
    border-radius:18px; border:1px solid var(--line);
  }
  .meditation-label {
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:var(--gold); font-weight:600; margin-bottom:8px;
  }
  .meditation-title {
    font-family:Georgia,serif; font-size:16px; color:var(--text-dark);
    margin-bottom:14px; line-height:1.4;
  }
  audio {
    width:100%; height:40px;
    border-radius:999px; outline:none;
  }
  audio::-webkit-media-controls-panel { background:var(--card-bg); }
  .meditation-coming-soon {
    font-size:13.5px; color:var(--text-muted); font-style:italic;
    padding:10px 0 2px;
  }

  /* CTA */
  .cta-box {
    margin-top:24px; padding:22px 24px;
    background:linear-gradient(135deg,#fbf1ee,#f6e3e6);
    border-radius:18px; border:1px solid var(--line);
  }
  .cta-text { font-size:14.5px; line-height:1.65; color:var(--text-dark); margin-bottom:16px; }
  a.cta-link {
    display:inline-block; background:var(--accent); color:#fff;
    text-decoration:none; padding:13px 26px; border-radius:999px;
    font-size:14px; font-weight:600; letter-spacing:0.3px;
    transition:all 0.2s ease;
  }
  a.cta-link:hover { background:var(--accent-deep); transform:translateY(-2px); }

  .restart {
    display:block; text-align:center; margin-top:26px;
    font-size:13px; color:var(--text-muted); cursor:pointer;
    text-decoration:underline; background:none; border:none; font-family:inherit;
  }

  @media(max-width:480px){
    .card{padding:36px 22px;}
    h1{font-size:26px;}
    .q-text{font-size:18px;}
    .result-label{font-size:28px;}
    .phase-image-wrap img, .phase-image-placeholder{width:190px;}
    .phase-image-placeholder{height:268px;}
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
  // ─── CONFIGURATION ──────────────────────────────────────────────
  const BOOKING_LINK = "https://louisecargo.com"; // ← swap your booking/Calendly URL

  // Paste each hosted image URL below (Dropbox, Google Drive, your server, etc.)
  // Image files — stored in the Images/ subfolder
  const IMAGES = {
    a:   "Images/discover.jpg",
    b:   "Images/release.jpg",
    c:   "Images/reclaim.jpg",
    d:   "Images/become.jpg",
    tie: "Images/transition.jpg"
  };

  // Audio files — place these in the same folder as this HTML file
  // discover.mp3 | release.mp3 | reclaim.mp3 | become.mp3 | transition.mp3
  const AUDIO = {
    a:   "discover.mp3",
    b:   "release.mp3",
    c:   "reclaim.mp3",
    d:   "become.mp3",
    tie: "transition.mp3"
  };

  const MEDITATION_TITLES = {
    a:   "A meditation for when you're in the fog",
    b:   "A meditation for grief and letting go",
    c:   "A meditation for learning to trust yourself again",
    d:   "A meditation for stepping into who you're becoming",
    tie: "A meditation for being in transition"
  };
  // ────────────────────────────────────────────────────────────────

  const questions = [
    { q:"When you think about how you feel day to day, which comes closest?", opts:["I'm functioning but I feel like I'm watching my life from a distance. Something is off but I can't put my finger on what.","I know what's shifted but sitting with that loss is almost unbearable some days. I'm grieving something I never got to say goodbye to.","I'm starting to feel like myself again in flashes. But I don't fully trust it yet.","I feel more like myself than I have in years. Not the old me — something clearer than that."] },
    { q:"When someone asks how you are, you:", opts:["Say you're fine because explaining what's actually happening feels impossible — you don't even have the words for it yet.","Could cry if they asked properly. There's so much underneath the surface that you're holding together.","Give an honest answer more often than you used to. You're learning to say what's actually true.","Mean it when you say you're good. Not perfect — but genuinely, actually okay."] },
    { q:"The thing that keeps you up at night is:", opts:["A low hum of anxiety you can't trace back to anything specific. Just a feeling that something is wrong.","The life you thought you'd have by now. The version of yourself you were supposed to be.","Whether the clarity you've been feeling is real or whether it will disappear again.","What comes next. Not from fear — from genuine curiosity about who you're becoming."] },
    { q:"When you look in the mirror, you:", opts:["Don't quite recognise the person looking back. It's not just physical — something deeper has shifted.","See someone who has been through something real. And you're still not sure you're ready for what that means.","Are starting to make peace with what you see. Some days more than others.","See someone who has come through something and is still standing. That means something to you now."] },
    { q:"Your relationship with your own needs right now:", opts:["What needs? You're so busy trying to feel normal that your own needs barely register.","You know what you need. You're just not sure you're allowed to want it — or whether it's too late.","You're learning to listen to yourself again. It feels unfamiliar but not wrong.","You're getting better at putting yourself in the picture. It's still a practice but it's becoming yours."] },
    { q:"When you think about the future, you feel:", opts:["Foggy. You can't see clearly enough to imagine what comes next.","Sad, mostly. Like something closed before you got to finish it.","Cautiously hopeful. Like something is starting to open up, even if you can't name it yet.","Ready. Not fearless — but ready."] },
    { q:"The personal development work you've done before:", opts:["Hasn't touched what's happening right now. You're not even sure what the problem is yet.","Helped before but isn't reaching this particular grief. This season feels different.","Is starting to make sense in a new way. Like the pieces are rearranging themselves.","Feels like it was preparation for exactly this moment."] },
    { q:"The word that best describes where you are right now:", opts:["Lost","Grieving","Tentative","Emerging"] },
    { q:"What you most need someone to say to you right now:", opts:['"What you\'re experiencing is real. There\'s a reason you feel this way."','"You\'re allowed to grieve this. You don\'t have to hold it together."','"You can trust what you\'re finding inside yourself. It\'s real."','"You\'re ready for this next chapter. You\'ve already done the hard part."'] },
    { q:"Your sense of identity right now:", opts:["Feels like it's dissolved. You're not sure who you are outside of the roles you play.","Feels like something you're mourning. You knew who you were — and that person feels out of reach.","Is starting to reform. It's unfamiliar but it feels more honest than before.","Feels chosen for the first time. Not inherited or expected — actually chosen."] },
    { q:"If you had to describe this season of your life in one sentence:", opts:['"I don\'t recognise myself and I don\'t know how to find my way back."','"I know what I\'ve lost and I\'m not sure I\'m ready to let it go."','"I\'m finding my way back to myself — slowly, but I can feel it."','"I\'m becoming someone I actually chose to be."'] },
    { q:"What brought you here today:", opts:["Something had to change. I just don't know what yet.","I need to stop carrying this alone.","I'm ready to trust this process properly.","I want support for the next step — not because I'm lost, but because I want to do this well."] }
  ];

  const results = {
    a: { label:"DISCOVER", tagline:"You're in the fog — and the fog is real.", paras:[
      {t:"Something has shifted and you know it. You just can't name it yet — and that's one of the most disorienting places a woman can be. You're functioning. You're showing up. But there's a distance between you and your own life that you can't quite close, and you're starting to wonder if this is just who you are now."},
      {t:"It isn't.", solo:true},
      {t:"What's happening to you has a name. It has a reason. And the fact that you can't think or push or optimise your way out of it isn't a failure — it's information. This particular season doesn't respond to the tools that worked before. It needs something different."},
      {t:"The first phase of Your Becoming is Discover — and it begins with exactly where you are right now. Not with fixing. Not with reframing. With understanding what has actually happened to your sense of self, and why. That understanding is the beginning of everything."},
      {t:"You're not broken. You're at the beginning.", solo:true}
    ], cta:"The Finding Yourself Journey starts here — with making sense of what's happening before we try to change anything." },

    b: { label:"RELEASE", tagline:"You know what you've lost. Now comes the part no one talks about.", paras:[
      {t:"You're past the fog. You understand, at least in part, what's shifted and why. But knowing hasn't made it easier — if anything, it's made it more real. Because now you're sitting with the grief of it. The version of yourself you thought you'd be. The life you thought you'd have by now. The things you never got to say goodbye to."},
      {t:"This is Release — and it's the phase most women want to skip. It's uncomfortable and it's slow and it doesn't look like progress from the outside. But it is the work. Because you cannot move forward while you're still holding tightly to what you thought your life was going to be."},
      {t:"You don't have to let go of everything. But you do have to put some things down. And you don't have to do that alone."},
      {t:"You're not stuck. You're in the part that takes courage.", solo:true}
    ], cta:"This is exactly the work the Finding Yourself Journey was built for." },

    c: { label:"RECLAIM", tagline:"You can feel yourself coming back. Trust that.", paras:[
      {t:"Something has shifted again — quietly, maybe tentatively, but it's real. You're starting to hear your own voice again. Starting to know what you actually want rather than what you're supposed to want. Starting to make choices that feel like yours."},
      {t:"But you don't fully trust it yet. Part of you is waiting for the fog to come back. Part of you wonders if this clarity is permanent or just a good week. That doubt is normal — and it doesn't mean you're not ready. It means you're in Reclaim."},
      {t:"This phase is about learning to trust what's already inside you. Not performing confidence. Not convincing yourself. Actually listening to what you know — and letting that be enough."},
      {t:"You've done the hard internal work to get here. The next step is learning to stand in it."},
      {t:"You're not almost there. You're already in it.", solo:true}
    ], cta:"The Finding Yourself Journey meets you exactly here — with tools to help you trust what you're finding and build on it." },

    d: { label:"BECOME", tagline:"You know who you're becoming. Now claim her fully.", paras:[
      {t:"You've come through something real. The fog, the grief, the slow work of finding your way back to yourself — you've done it, or you're doing it, and it shows. You feel more like yourself than you have in years. Not the self you were before — something clearer. Something chosen."},
      {t:"You're in Become — the phase where the woman you've been finding becomes the woman you're living as. This isn't the end of the journey. It's the beginning of the chapter where you stop recovering and start creating."},
      {t:"Some women in this phase think they don't need support because they're no longer in crisis. But this is actually one of the most powerful times to work with someone — when you're clear enough to build intentionally rather than just survive."},
      {t:"You're not almost yourself. You are her. Own it.", solo:true}
    ], cta:"If you want support to build this chapter with intention — not from fear, but from clarity — book a conversation with Louise." },

    tie: { label:"IN TRANSITION", tagline:"You're not in one place — and that's exactly right.", paras:[
      {t:"If your answers landed across more than one phase, that's not a sign the quiz didn't work. It's a sign you're in transition — which is one of the most common and most uncomfortable places to be. You might have one foot in the fog and one foot in the grief. Or you might be moving between Reclaim and Become, clear some days and uncertain others."},
      {t:"Transition isn't a problem to solve. It's the actual texture of this journey. It's not linear and it doesn't follow a timetable."},
      {t:"What matters is that you're in it — and you showed up today to understand it better. That's not nothing. That's the beginning."},
      {t:"You're not behind. You're in motion.", solo:true}
    ], cta:"A conversation with Louise will help you work out exactly where you are and what you need next." }
  };

  const letters = ['a','b','c','d'];
  let state = { screen:'intro', qIdx:0, answers:[] };

  function getResult() {
    const c={a:0,b:0,c:0,d:0};
    state.answers.forEach(i=>c[letters[i]]++);
    const max=Math.max(...Object.values(c));
    const winners=Object.keys(c).filter(k=>c[k]===max);
    return winners.length===1 ? results[winners[0]] : results.tie;
  }

  function getResultKey() {
    const c={a:0,b:0,c:0,d:0};
    state.answers.forEach(i=>c[letters[i]]++);
    const max=Math.max(...Object.values(c));
    const winners=Object.keys(c).filter(k=>c[k]===max);
    return winners.length===1 ? winners[0] : 'tie';
  }

  function render() {
    const app = document.getElementById('app');

    if (state.screen === 'intro') {
      app.innerHTML = `
        <div class="card">
          <div class="eyebrow">Your Becoming</div>
          <h1>Where are you in your journey?</h1>
          <p class="intro-text">
            You already know something has shifted. This isn't about whether you recognise yourself right now — it's about where you actually are in finding your way back.<br><br>
            Read each question and choose the answer that feels most true. <strong>Not the one you wish were true. The one that actually is.</strong>
          </p>
          <button class="btn-primary" id="beginBtn">Begin the quiz</button>
        </div>`;
      document.getElementById('beginBtn').onclick = () => {
        state = {screen:'question', qIdx:0, answers:[]};
        render();
      };
      return;
    }

    if (state.screen === 'question') {
      const q = questions[state.qIdx];
      const pct = (state.qIdx / questions.length) * 100;
      app.innerHTML = `
        <div class="card">
          <div class="progress-wrap">
            <div class="progress-label">Question ${state.qIdx+1} of ${questions.length}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="q-text">${q.q}</div>
          <div class="options">
            ${q.opts.map((o,i)=>`<button class="opt-btn" data-i="${i}">${o}</button>`).join('')}
          </div>
        </div>`;
      document.querySelectorAll('.opt-btn').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
          btn.classList.add('selected');
          const i = parseInt(btn.dataset.i);
          setTimeout(() => {
            state.answers[state.qIdx] = i;
            if (state.qIdx + 1 < questions.length) {
              state.qIdx++;
            } else {
              state.screen = 'result';
            }
            render();
          }, 280);
        };
      });
      return;
    }

    if (state.screen === 'result') {
      const key = getResultKey();
      const r = results[key];
      const imgSrc = IMAGES[key];
      const audioSrc = AUDIO[key];
      const medTitle = MEDITATION_TITLES[key];

      const imgHTML = imgSrc
        ? `<div class="phase-image-wrap"><img src="${imgSrc}" alt="${r.label} phase card"></div>`
        : `<div class="phase-image-wrap"><div class="phase-image-placeholder">Phase card image coming soon</div></div>`;

      const audioHTML = audioSrc
        ? `<div class="meditation-wrap">
            <div class="meditation-label">Your meditation</div>
            <div class="meditation-title">${medTitle}</div>
            <audio controls src="${audioSrc}"></audio>
           </div>`
        : `<div class="meditation-wrap">
            <div class="meditation-label">Your meditation</div>
            <div class="meditation-title">${medTitle}</div>
            <p class="meditation-coming-soon">Your personalised meditation will appear here once recorded by Louise.</p>
           </div>`;

      app.innerHTML = `
        <div class="card result-card">
          ${imgHTML}
          <div class="result-eyebrow">Your result</div>
          <div class="result-label">${r.label}</div>
          <div class="result-tagline">${r.tagline}</div>
          <div class="result-body">
            ${r.paras.map(p=>`<p${p.solo?' class="solo"':''}>${p.t}</p>`).join('')}
          </div>
          ${audioHTML}
          <div class="cta-box">
            <p class="cta-text">${r.cta}</p>
            <a class="cta-link" href="${BOOKING_LINK}" target="_blank" rel="noopener">Book a conversation with Louise</a>
          </div>
          <button class="restart" id="restartBtn">Retake the quiz</button>
        </div>`;
      document.getElementById('restartBtn').onclick = () => {
        state = {screen:'intro', qIdx:0, answers:[]};
        render();
      };
    }
  }

  render();
</script>
</body>
</html>
